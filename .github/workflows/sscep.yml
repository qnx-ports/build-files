name: sscep

permissions:
  contents: write
  checks: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/sscep.yml"
      - "ports/sscep/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/sscep.yml"
      - "ports/sscep/**"

jobs:
  build:
    strategy:
      matrix:
        qnx_env: ["710", "800"]
      fail-fast: false
    name: Build for QNX ${{ matrix.qnx_env }}
    runs-on: ubuntu-22.04-common
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.title, 'sscep'))
    steps:
      - name: Checkout build-files
        uses: actions/checkout@v4
        with:
          repository: qnx-ports/build-files
          path: build-files

      - name: Checkout sscep
        uses: actions/checkout@v4
        with:
          repository: qnx-ports/sscep
          path: sscep

      - name: Build sscep
        shell: bash
        run: |
          if [[ ${{ matrix.qnx_env }} == 710 ]]; then
            source ~/qnx/710/qnxsdp-env.sh
          else
            source ~/qnx/800/qnxsdp-env.sh
          fi
          make -C build-files/ports/sscep install
